name: Sync Patient Dashboard Branch

on:
  push:
    paths:
      - "examples/patient-dashboard/**"
      - ".github/workflows/sync-patient-dashboard-branch.yml"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add target remote
        env:
          META_TEST_APPS_TOKEN: ${{ secrets.META_TEST_APPS_TOKEN }}
        run: |
          if [ -z "$META_TEST_APPS_TOKEN" ]; then
            echo "META_TEST_APPS_TOKEN secret is not set."
            exit 1
          fi
          git remote add meta-test-apps "https://x-access-token:${META_TEST_APPS_TOKEN}@github.com/shahramdj/Meta-test-apps.git"

      - name: Split patient dashboard subtree
        run: |
          git subtree split --prefix examples/patient-dashboard -b patient-dashboard-sync

      - name: Push subtree to target branch
        run: |
          # Keep this branch always synced with patient-dashboard subtree.
          git push --force meta-test-apps patient-dashboard-sync:patient-dashboard-from-origin
