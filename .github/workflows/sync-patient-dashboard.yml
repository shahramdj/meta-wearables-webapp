name: Sync Patient Dashboard To Meta-test-apps

on:
  push:
    branches: [ main ]
    paths:
      - examples/patient-dashboard/**
      - .github/workflows/sync-patient-dashboard.yml
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: shahramdj/Meta-test-apps
          token: ${{ secrets.META_TEST_APPS_TOKEN }}
          path: target
          fetch-depth: 1

      - name: Sync patient-dashboard files into target root
        run: |
          find target -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          rsync -av source/examples/patient-dashboard/ target/

      - name: Commit and push
        run: |
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to sync."
          else
            git commit -m "sync: patient-dashboard @ ${{ github.sha }}"
            git push origin main
          fi
